name: 'ecommerce_analytics'
version: '1.0.0'
config-version: 2

# Profil für die Datenbankverbindung
profile: 'ecommerce_analytics'

# Pfade für Modelle, Seeds, etc.
model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Modell-Konfigurationen
models:
  ecommerce_analytics:
    # Staging Layer: Views für schnelle Entwicklung
    staging:
      +materialized: view
      +schema: staging

    # Intermediate Layer: Views, da sie zwischen Staging und Marts liegen
    intermediate:
      +materialized: view
      +schema: intermediate

    # Marts Layer: Tables für Performance
    marts:
      +materialized: table
      +schema: marts

# Seed-Konfigurationen
seeds:
  ecommerce_analytics:
    +schema: raw
    +quote_columns: false
