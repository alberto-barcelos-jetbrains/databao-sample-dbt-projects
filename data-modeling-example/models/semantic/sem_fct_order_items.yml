semantic_models:
  - name: fct_order_items
    description: Order items fact at order-item grain with product, category, and high-value order flag.
    model: ref('mart_order_items_enriched')
    entities:
      - name: order_item
        type: primary
        expr: order_item_id
      - name: order
        type: foreign
        expr: order_id
      - name: product
        type: foreign
        expr: product_id
    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
      - name: category
        type: categorical
      - name: product_name
        type: categorical
      - name: is_high_value_order
        type: categorical
    measures:
      - name: item_revenue
        description: Sum of line totals in dollars.
        agg: sum
        expr: line_total
        agg_time_dimension: order_date
      - name: item_count
        description: Count of distinct order items.
        agg: count_distinct
        expr: order_item_id
        agg_time_dimension: order_date
      - name: high_value_item_revenue
        description: Revenue from items in orders above the mean order amount.
        agg: sum
        expr: "CASE WHEN is_high_value_order THEN line_total END"
        agg_time_dimension: order_date
      - name: total_quantity
        description: Sum of item quantities across all order line items.
        agg: sum
        expr: quantity
        agg_time_dimension: order_date
      - name: order_count_items
        description: Count of distinct orders containing at least one line item.
        agg: count_distinct
        expr: order_id
        agg_time_dimension: order_date

metrics:
  - name: monthly_category_revenue
    label: Monthly Category Revenue
    description: Total revenue by product category per month.
    type: simple
    type_params:
      measure: item_revenue

  - name: high_value_product_revenue
    label: High Value Product Revenue
    description: Revenue from products sold in orders above the mean order amount.
    type: simple
    type_params:
      measure: high_value_item_revenue

  - name: total_quantity_sold
    label: Total Quantity Sold
    description: Total number of items sold across all orders.
    type: simple
    type_params:
      measure: total_quantity

  - name: order_count_by_items
    label: Order Count (by Items)
    description: Number of distinct orders that contain at least one line item.
    type: simple
    type_params:
      measure: order_count_items

  - name: avg_basket_size
    label: Average Basket Size
    description: Average number of items per order, groupable by product category.
    type: derived
    type_params:
      expr: total_quantity_sold / order_count_by_items
      metrics:
        - name: total_quantity_sold
        - name: order_count_by_items
