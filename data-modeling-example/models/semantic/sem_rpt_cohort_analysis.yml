semantic_models:
  - name: rpt_cohort_analysis
    description: Pre-aggregated cohort revenue — one row per (cohort_month, order_month).
    model: ref('rpt_cohort_analysis')
    entities:
      - name: cohort_order_period
        type: primary
        expr: "cohort_month::varchar || '_' || order_month::varchar"
    dimensions:
      - name: order_month
        type: time
        type_params:
          time_granularity: month
      - name: cohort_month
        type: categorical
        expr: cohort_month::varchar
    measures:
      - name: cohort_revenue
        description: Total revenue for a cohort in a given order month.
        agg: sum
        expr: total_revenue
        agg_time_dimension: order_month

metrics:
  - name: cohort_monthly_revenue
    label: Cohort Monthly Revenue
    description: Total revenue generated by each signup cohort per order month.
    type: simple
    type_params:
      measure: cohort_revenue
